<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LifeDrop - Live Operations Center</title>

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Icons -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">

    <!-- Chart -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <!-- Leaflet Map -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <!-- Custom Styles -->
    <link rel="stylesheet" href="css/style.css">
</head>

<body class="antialiased min-h-screen flex flex-col">

    <!-- NAVBAR -->
    <nav class="glass-header px-6 py-4 flex justify-between items-center sticky top-0 z-40">
        <div class="flex items-center gap-4">
            <div class="flex items-center justify-center bg-red-100 w-12 h-12 rounded-full border border-red-200 shadow-sm">
                <i class="fa-solid fa-droplet text-red-600 text-xl"></i>
            </div>
            <div>
                <h1 class="text-3xl font-extrabold text-slate-800 tracking-tight">Life<span class="text-red-500">Drop</span></h1>
                <p class="text-xs text-slate-500 uppercase tracking-widest font-semibold flex items-center gap-2 mt-0.5">
                    <span class="live-indicator"></span> System Online
                </p>
            </div>
        </div>
        <div id="nav-links" class="flex gap-4 items-center"></div>
    </nav>

    <!-- TICKER (Global Live Feed) -->
    <div class="ticker-wrap w-full py-2 z-30 relative hidden" id="liveTicker">
        <div class="ticker-move text-xs text-slate-600 font-bold tracking-wide" id="tickerData">
            <span class="mx-4"><span class="text-slate-400">Loading live data...</span></span>
        </div>
    </div>

    <!-- MAIN APP CONTAINER -->
    <main id="app-container" class="flex-grow p-6 w-full max-w-7xl mx-auto z-10"></main>

    <!-- ================= LANDING ================= -->
    <template id="view-landing">
        <div class="flex flex-col items-center justify-center mt-24 text-center space-y-8 animate-fade-in relative z-10">
            <div class="inline-block p-5 rounded-full bg-red-50 border border-red-100 shadow-md mb-2">
                <i class="fa-solid fa-heart-pulse text-6xl text-red-500 animate-pulse"></i>
            </div>
            <h1 class="text-6xl md:text-7xl font-black text-slate-900 tracking-tight">
                Save Lives in <span class="text-red-500">Real-Time.</span>
            </h1>
            <p class="text-lg text-slate-600 font-medium max-w-2xl mx-auto leading-relaxed">
                Connect instantly with a live network of heroes. LifeDrop orchestrates blood requests and donations at lightning speed directly from your browser.
            </p>
            
            <div class="flex gap-4 mt-10">
                <button onclick="showView('login')" class="card-hover px-10 py-4 bg-red-600 text-white rounded-xl font-bold text-lg shadow-lg shadow-red-500/30 flex items-center gap-3">
                    <i class="fa-solid fa-right-to-bracket"></i> Login Access
                </button>
                <button onclick="showView('register')" class="card-hover px-10 py-4 glass-panel text-slate-800 rounded-xl font-bold text-lg flex items-center gap-3">
                    <i class="fa-solid fa-user-plus text-red-500"></i> Join Network
                </button>
            </div>
        </div>
    </template>

    <!-- ================= LOGIN ================= -->
    <template id="view-login">
        <div class="max-w-md mx-auto mt-20 animate-fade-in">
            <div class="glass-panel p-10 rounded-2xl relative overflow-hidden">
                <h2 class="text-3xl font-black mb-8 text-slate-900 flex items-center"><i class="fa-solid fa-lock text-red-500 mr-3"></i> System Login</h2>
                <form onsubmit="handleLogin(event)" class="space-y-6">
                    <div>
                        <label class="block text-sm font-bold text-slate-700 mb-2">Username</label>
                        <input id="username" placeholder="Enter standard ID" class="w-full p-4 bg-white border border-slate-200 rounded-xl text-slate-900 focus:outline-none focus:border-red-500 focus:ring-2 focus:ring-red-200 transition-all font-medium" required>
                    </div>
                    <div>
                        <label class="block text-sm font-bold text-slate-700 mb-2">Secure Password</label>
                        <input id="password" type="password" placeholder="••••••••" class="w-full p-4 bg-white border border-slate-200 rounded-xl text-slate-900 focus:outline-none focus:border-red-500 focus:ring-2 focus:ring-red-200 transition-all font-medium" required>
                    </div>
                    <button class="w-full bg-red-600 hover:bg-red-700 text-white p-4 rounded-xl font-bold text-lg shadow-lg shadow-red-500/20 card-hover transition-colors">
                        Authenticate <i class="fa-solid fa-arrow-right ml-2"></i>
                    </button>
                </form>
            </div>
        </div>
    </template>

    <!-- ================= REGISTER ================= -->
    <template id="view-register">
        <div class="max-w-md mx-auto mt-16 pb-10 animate-fade-in">
            <div class="glass-panel p-10 rounded-2xl relative overflow-hidden">
                <h2 class="text-3xl font-black mb-6 text-slate-900 flex items-center"><i class="fa-solid fa-id-card text-red-500 mr-3"></i> Registration</h2>
                <form onsubmit="handleRegister(event)" class="space-y-6">
                    <div>
                        <label class="block text-sm font-bold text-slate-700 mb-2">Choose Username</label>
                        <input id="reg-username" placeholder="Username" class="w-full p-4 bg-white border border-slate-200 rounded-xl text-slate-900 focus:outline-none focus:border-red-500 focus:ring-2 focus:ring-red-200 transition-all font-medium" required>
                    </div>
                    <div>
                        <label class="block text-sm font-bold text-slate-700 mb-2">Primary Password</label>
                        <input id="reg-password" type="password" placeholder="••••••••" class="w-full p-4 bg-white border border-slate-200 rounded-xl text-slate-900 focus:outline-none focus:border-red-500 focus:ring-2 focus:ring-red-200 transition-all font-medium" required>
                    </div>
                    <div>
                        <label class="block text-sm font-bold text-slate-700 mb-2">Network Role</label>
                        <select id="reg-role" class="w-full p-4 bg-white border border-slate-200 rounded-xl text-slate-900 appearance-none focus:outline-none focus:border-red-500 focus:ring-2 focus:ring-red-200 font-medium">
                            <option value="USER">Standard User</option>
                            <option value="DONOR">Verified Donor</option>
                            <option value="ADMIN">System Administrator</option>
                        </select>
                    </div>
                    <button class="w-full bg-slate-900 hover:bg-slate-800 text-white p-4 rounded-xl font-bold shadow-lg shadow-slate-900/20 card-hover transition-colors">
                        Initialize Profile <i class="fa-solid fa-server ml-2"></i>
                    </button>
                    <p class="text-center text-xs font-bold text-slate-500 mt-4 uppercase tracking-wider">Secure Node Connection</p>
                </form>
            </div>
        </div>
    </template>

    <!-- ================= USER DASHBOARD ================= -->
    <template id="view-user-dashboard">
        <div class="grid grid-cols-1 lg:grid-cols-2 gap-8 animate-fade-in">
            <!-- Left Panel -->
            <div class="space-y-8">
                <div class="flex items-center justify-between">
                    <h2 class="text-4xl font-black text-slate-900 flex items-center gap-3">
                        <i class="fa-solid fa-satellite-dish text-red-500"></i> Dispatch Center
                    </h2>
                </div>

                <div class="glass-panel p-8 rounded-2xl relative overflow-hidden border-t-4 border-t-red-500">
                    <div class="absolute top-0 right-0 p-4">
                        <span class="live-indicator"></span>
                    </div>
                    <h3 class="text-2xl font-bold mb-6 text-slate-900"><i class="fa-solid fa-triangle-exclamation text-red-500"></i> Broadcast Emergency</h3>
                    <form onsubmit="submitEmergency(event)" class="space-y-5">
                        <div class="grid grid-cols-2 gap-4">
                            <div>
                                <label class="block text-xs font-bold text-slate-600 uppercase tracking-wide mb-1">Patient Identifier</label>
                                <input id="req-patient" placeholder="Patient Name" class="w-full p-3 bg-white border border-slate-200 rounded-lg text-slate-900 font-medium focus:ring-2 focus:ring-red-100 outline-none" required>
                            </div>
                            <div>
                                <label class="block text-xs font-bold text-slate-600 uppercase tracking-wide mb-1">Blood Type</label>
                                <select id="req-bg" class="w-full p-3 bg-white border border-slate-200 rounded-lg text-slate-900 appearance-none font-medium text-red-600">
                                    <option value="A+">A Positive (A+)</option>
                                    <option value="A-">A Negative (A-)</option>
                                    <option value="B+">B Positive (B+)</option>
                                    <option value="B-">B Negative (B-)</option>
                                    <option value="O+">O Positive (O+)</option>
                                    <option value="O-">O Negative (O-)</option>
                                    <option value="AB+">AB Positive (AB+)</option>
                                    <option value="AB-">AB Negative (AB-)</option>
                                </select>
                            </div>
                        </div>

                        <div>
                            <label class="block text-xs font-bold text-slate-600 uppercase tracking-wide mb-1">Urgency Level</label>
                            <select id="req-urgency" class="w-full p-3 bg-white border border-slate-200 rounded-lg text-slate-900 appearance-none border-l-4 border-l-red-500 font-medium">
                                <option value="CRITICAL">CRITICAL (Within 2 Hours)</option>
                                <option value="HIGH">HIGH (Within 12 Hours)</option>
                                <option value="MEDIUM">MEDIUM (Within 24 Hours)</option>
                            </select>
                        </div>

                        <div>
                            <label class="block text-xs font-bold text-slate-600 uppercase tracking-wide mb-1">Facility Name</label>
                            <input id="req-hospital" placeholder="Hospital / Ward" class="w-full p-3 bg-white border border-slate-200 rounded-lg text-slate-900 font-medium" required>
                        </div>
                        <div>
                            <label class="block text-xs font-bold text-slate-600 uppercase tracking-wide mb-1">Emergency Contact</label>
                            <input id="req-contact" placeholder="+1 (555) 000-0000" class="w-full p-3 bg-white border border-slate-200 rounded-lg text-slate-900 font-medium" required>
                        </div>

                        <button class="w-full bg-red-600 hover:bg-red-700 text-white py-4 rounded-xl font-bold text-lg shadow-lg shadow-red-500/20 card-hover flex items-center justify-center gap-2 mt-4 transition-colors">
                            <i class="fa-solid fa-broadcast-tower"></i> Deploy Request
                        </button>
                    </form>
                </div>
            </div>

            <!-- Right Panel: Live Map Placeholder / Feed -->
            <div class="space-y-6">
                <!-- Map UI Container -->
                <div class="glass-panel p-2 rounded-2xl h-[500px] relative overflow-hidden flex flex-col shadow-lg shadow-slate-200/50">
                    <div class="bg-slate-50 p-3 rounded-t-xl border-b border-slate-200 flex justify-between items-center z-10 w-full relative">
                        <span class="text-sm font-bold text-slate-800"><i class="fa-solid fa-map-location-dot text-red-500 mr-2"></i>Live Geo-Tracking</span>
                        <div class="flex gap-2">
                            <span class="px-2 py-1 bg-white border border-slate-200 rounded text-xs text-slate-600 font-bold tracking-wider">SAT</span>
                            <span class="px-2 py-1 bg-red-50 text-red-600 rounded text-xs border border-red-200 font-bold tracking-wider">RADAR</span>
                        </div>
                    </div>
                    <!-- Real Leaflet Map Container -->
                    <div id="real-map" class="flex-grow w-full h-full z-0 bg-[#e5e5f7] rounded-b-xl border border-t-0 border-slate-200"></div>
                </div>
            </div>
        </div>
    </template>

    <!-- ================= ADMIN DASHBOARD ================= -->
    <template id="view-admin-dashboard">
        <div class="space-y-8 animate-fade-in relative z-10">
            <header class="flex justify-between items-end border-b border-slate-200 pb-4">
                <div>
                    <h1 class="text-4xl font-black text-slate-900"><i class="fa-solid fa-shield-halved text-red-500 mr-3"></i>Command Center</h1>
                    <p class="text-slate-500 mt-1 font-medium text-lg">Global System Overview & Diagnostics</p>
                </div>
                <div class="text-right glass-panel px-6 py-2 rounded-lg">
                    <p class="text-xs text-slate-500 font-bold uppercase tracking-widest">Network Status</p>
                    <p class="text-green-600 font-bold text-sm"><i class="fa-solid fa-check-circle mr-1"></i> OPTIMAL</p>
                </div>
            </header>

            <!-- STATS GRID -->
            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6">
                <!-- Stat Card 1 -->
                <div class="glass-panel p-6 rounded-2xl border border-slate-200 card-hover relative overflow-hidden bg-white">
                    <i class="fa-solid fa-users absolute -right-4 -bottom-4 text-7xl text-slate-100"></i>
                    <p class="text-xs font-bold text-slate-500 uppercase tracking-wider mb-2">Total Users</p>
                    <h2 id="stat-users" class="text-4xl font-black text-slate-800 flex items-baseline gap-2">
                        0 <span class="text-sm text-green-500 font-bold"><i class="fa-solid fa-arrow-trend-up"></i> +12%</span>
                    </h2>
                </div>
                <!-- Stat Card 2 -->
                <div class="glass-panel p-6 rounded-2xl border border-slate-200 card-hover relative overflow-hidden bg-white">
                    <i class="fa-solid fa-hand-holding-medical absolute -right-4 -bottom-4 text-7xl text-slate-100"></i>
                    <p class="text-xs font-bold text-slate-500 uppercase tracking-wider mb-2">Active Donors</p>
                    <h2 id="stat-donors" class="text-4xl font-black text-slate-800 flex items-baseline gap-2">
                        0 <span class="text-sm text-teal-500 font-bold">Ready</span>
                    </h2>
                </div>
                <!-- Stat Card 3 -->
                <div class="glass-panel p-6 rounded-2xl border-2 border-red-500 card-hover relative overflow-hidden bg-red-50/50">
                    <div class="absolute top-4 right-4"><span class="live-indicator"></span></div>
                    <i class="fa-solid fa-truck-medical absolute -right-4 -bottom-4 text-7xl text-red-100/50"></i>
                    <p class="text-xs font-bold text-red-600 uppercase tracking-wider mb-2">Live Emergencies</p>
                    <h2 id="stat-emergencies" class="text-5xl font-black text-red-600">0</h2>
                </div>
                <!-- Stat Card 4 -->
                <div class="glass-panel p-6 rounded-2xl border border-slate-200 card-hover relative overflow-hidden bg-white">
                    <i class="fa-solid fa-droplet absolute -right-4 -bottom-4 text-7xl text-slate-100"></i>
                    <p class="text-xs font-bold text-slate-500 uppercase tracking-wider mb-2">Pints Donated</p>
                    <h2 id="stat-pints" class="text-4xl font-black stat-value flex items-baseline gap-2">
                        1,450 <span class="text-xs text-slate-400 font-semibold">This Month</span>
                    </h2>
                </div>
            </div>

            <div class="grid grid-cols-1 lg:grid-cols-3 gap-6 mt-6">
                <!-- CHART TERMINAL -->
                <div class="lg:col-span-2 glass-panel p-6 rounded-2xl border border-slate-200 bg-white">
                    <div class="flex justify-between items-center mb-6">
                        <h3 class="text-xl font-bold text-slate-800"><i class="fa-solid fa-chart-line text-red-500 mr-2"></i> Network Traffic Flow</h3>
                        <select class="bg-white text-sm font-bold text-slate-600 border border-slate-200 rounded-lg px-3 py-1 outline-none">
                            <option>Last 7 Days</option>
                            <option>Last 24 Hours</option>
                        </select>
                    </div>
                    <div class="h-80 w-full relative">
                        <canvas id="trafficChart"></canvas>
                    </div>
                </div>

                <!-- SYSTEM LOGS -->
                <div class="glass-panel p-0 rounded-2xl border border-slate-200 bg-white flex flex-col h-full overflow-hidden">
                    <div class="p-4 border-b border-slate-200 shadow-sm z-10 bg-slate-50">
                        <h3 class="text-sm font-bold text-slate-800 uppercase tracking-wider"><i class="fa-solid fa-terminal text-slate-600 mr-2"></i> System Activity Logs</h3>
                    </div>
                    <div class="flex-grow p-5 font-mono text-xs space-y-3 overflow-y-auto max-h-80 bg-white" id="admin-logs">
                        <div class="text-slate-600 font-semibold">[10:01:45] <span class="text-blue-500">INFO</span> System booted. Websocket config OK.</div>
                        <div class="text-slate-600 font-semibold">[10:02:12] <span class="text-green-500">AUTH</span> User admin authenticated via core.</div>
                        <div class="text-slate-600 font-semibold">[10:05:30] <span class="text-red-500">WARN</span> API map relay ping successful.</div>
                    </div>
                </div>
            </div>
        </div>
    </template>

    <!-- ================= DONOR DASHBOARD ================= -->
    <template id="view-donor-dashboard">
        <div class="max-w-4xl mx-auto space-y-8 animate-fade-in relative z-10">
            <!-- Header Profile -->
            <div class="glass-panel p-8 rounded-2xl border border-slate-200 flex items-center gap-6 relative overflow-hidden bg-white">
                <div class="absolute -right-10 -top-10 opacity-5">
                    <i class="fa-solid fa-droplet text-[200px] text-red-500"></i>
                </div>
                <div class="w-24 h-24 rounded-full bg-slate-50 border-4 border-red-500 flex items-center justify-center flex-shrink-0 shadow-lg shadow-red-500/20">
                    <i class="fa-solid fa-user-doctor text-4xl text-red-500"></i>
                </div>
                <div>
                    <span class="px-3 py-1 bg-red-100 text-red-700 rounded-full text-xs font-black tracking-wider uppercase border border-red-200 mb-2 inline-block shadow-sm">Active Donor</span>
                    <h1 class="text-4xl font-black text-slate-900 mb-1 tracking-tight" id="donor-name-display">Donor Profile</h1>
                    <p class="text-slate-500 font-medium text-sm"><i class="fa-solid fa-location-dot mr-1"></i> Waiting for next dispatch signal...</p>
                </div>
            </div>

            <!-- Grid Data -->
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <!-- Eligibility -->
                <div class="glass-panel p-8 rounded-2xl border border-slate-200 bg-white shadow-sm">
                    <h3 class="text-xl font-black text-slate-800 mb-6 border-b border-slate-100 pb-3"><i class="fa-solid fa-calendar-check text-green-500 mr-2"></i> Eligibility Status</h3>
                    
                    <div class="space-y-5">
                        <div>
                            <div class="flex justify-between text-sm font-bold mb-2">
                                <span class="text-slate-600">Time Until Next Donation</span>
                                <span class="text-green-600">Ready Now</span>
                            </div>
                            <div class="w-full bg-slate-100 rounded-full h-3 border border-slate-200">
                                <div class="bg-gradient-to-r from-green-400 to-green-500 h-full rounded-full" style="width: 100%"></div>
                            </div>
                        </div>
                        <ul class="text-sm font-bold text-slate-600 space-y-3 mt-6">
                            <li class="flex items-center"><i class="fa-solid fa-check-circle text-green-500 mr-2 text-lg"></i> Last donated: > 3 months ago</li>
                            <li class="flex items-center"><i class="fa-solid fa-check-circle text-green-500 mr-2 text-lg"></i> Health screening passed</li>
                        </ul>
                        <button class="w-full mt-6 bg-slate-100 hover:bg-slate-200 text-slate-700 py-3 rounded-xl transition-colors font-bold shadow-sm">
                            Update Health Log
                        </button>
                    </div>
                </div>

                <!-- Local Requests -->
                <div class="glass-panel p-8 rounded-2xl border border-red-200 bg-red-50 relative shadow-sm">
                    <div class="absolute top-6 right-6"><span class="live-indicator"></span></div>
                    <h3 class="text-xl font-black text-red-600 mb-6 border-b border-red-200/50 pb-3"><i class="fa-solid fa-radar mr-2"></i> Live Matches Map Tracker</h3>
                    
                    <div class="space-y-4" id="donor-matches">
                        <div class="text-center font-bold text-slate-400 mt-6"><i class="fa-solid fa-spinner animate-spin mr-2"></i> Syncing local emergencies...</div>
                    </div>
                </div>
            </div>
        </div>
    </template>

    <!-- ================= AI CHAT BOT ================= -->
    <!-- Chat Button -->
    <button onclick="toggleChat()" class="fixed bottom-6 right-6 bg-red-600 hover:bg-red-500 text-white w-16 h-16 rounded-full shadow-[0_10px_25px_rgba(239,68,68,0.4)] flex items-center justify-center text-2xl card-hover z-50 transition-all border-2 border-white group">
        <i class="fa-solid fa-robot group-hover:scale-110 transition-transform"></i>
    </button>

    <!-- Chat Panel -->
    <div id="ai-chat-panel" class="hidden fixed bottom-28 right-6 w-80 md:w-96 glass-panel rounded-2xl shadow-2xl flex-col overflow-hidden z-50 border border-slate-200 animate-fade-in bg-white">
        <div class="bg-gradient-to-r from-red-600 to-red-500 p-4 text-white flex justify-between items-center shadow-md z-10">
            <span class="font-black tracking-wider text-lg"><i class="fa-solid fa-brain mr-2 animate-pulse text-white/80"></i> LifeDrop AI</span>
            <button onclick="toggleChat()" class="text-white/80 hover:text-white transition-colors"><i class="fa-solid fa-times text-xl"></i></button>
        </div>
        <div id="ai-chat-history" class="p-5 h-72 overflow-y-auto space-y-4 flex text-sm flex-col bg-slate-50 scroll-smooth">
            <div class="text-left mb-2">
                <span class="bg-white text-slate-800 px-4 py-3 rounded-2xl rounded-tl-sm inline-block border border-slate-200 shadow-sm font-medium">
                    <strong class="text-red-600 block mb-1">LifeDrop AI:</strong> Hello! I am your real-time medical dispatch assistant. I can help predict donor availability or route critical emergencies.
                </span>
            </div>
        </div>
        <form onsubmit="event.preventDefault(); sendAiMessage();" class="p-3 bg-white flex border-t border-slate-200 z-10">
            <input id="ai-chat-input" type="text" class="flex-grow bg-slate-100 border border-slate-200 rounded-l-xl text-slate-800 px-4 py-3 font-medium focus:outline-none focus:border-red-500 transition-colors" placeholder="Ask intelligence...">
            <button type="submit" class="bg-red-600 hover:bg-red-700 px-5 rounded-r-xl transition-colors shadow-md shadow-red-500/20"><i class="fa-solid fa-paper-plane text-white"></i></button>
        </form>
    </div>

    <!-- ================= SCRIPTS ================= -->
    <script src="https://cdn.jsdelivr.net/npm/sockjs-client@1/dist/sockjs.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/stompjs/lib/stomp.min.js"></script>
    <script src="js/app.js"></script>

</body>

</html>
